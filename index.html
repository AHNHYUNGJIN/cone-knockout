<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>콘 녹아웃 프로 (Cone Knockout Pro) - 디버그 모드</title>
  
  <!-- Google Fonts & MediaPipe Libraries -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

  <style>
    :root {
      --bg-dark: #07080d;
      --panel-bg: rgba(13, 17, 28, 0.75);
      --panel-border: rgba(255, 255, 255, 0.08);
      --primary: #ff2a85;       /* Neon Pink */
      --secondary: #00f0ff;     /* Neon Cyan */
      --accent: #ffb800;        /* Neon Gold */
      --danger: #ff3b30;        /* Red Bomb */
      --text: #f5f6fa;
      --text-muted: #6e768a;
      --vh: 1vh;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text);
      font-family: 'Outfit', 'Noto Sans KR', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: calc(var(--vh, 1vh) * 100);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Ambient Background Glows */
    .bg-glow {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 1;
      opacity: 0.3;
      pointer-events: none;
      transition: background-color 0.4s ease;
    }
    .glow-1 { top: -50px; left: -50px; background-color: var(--primary); }
    .glow-2 { bottom: -50px; right: -50px; background-color: var(--secondary); }

    /* Main Container */
    #app-container {
      position: relative;
      width: 100%;
      height: 100%;
      max-width: 500px;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      z-index: 2;
      background: #0d0f17;
    }

    @media (min-width: 1025px) {
      #app-container {
        height: 92vh;
        border-radius: 28px;
        border: 1px solid var(--panel-border);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.6), 0 0 40px rgba(0, 240, 255, 0.05);
        overflow: hidden;
      }
    }

    /* HUD */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 16px;
      background: linear-gradient(180deg, rgba(7, 8, 13, 0.95) 0%, rgba(7, 8, 13, 0) 100%);
      z-index: 10;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }

    .brand-section {
      display: flex;
      flex-direction: column;
    }

    .logo {
      font-weight: 900;
      font-size: 1.15rem;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-transform: uppercase;
    }

    .sub-brand {
      font-size: 0.55rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 700;
      margin-top: -2px;
    }

    .stats-container {
      display: flex;
      gap: 6px;
    }

    .stat-badge {
      background: var(--panel-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--panel-border);
      padding: 6px 10px;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 60px;
    }

    .stat-label {
      font-size: 0.5rem;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 800;
      letter-spacing: 0.3px;
    }

    .stat-value {
      font-size: 0.95rem;
      font-weight: 900;
      color: #fff;
    }

    .stat-value.score-highlight {
      color: var(--secondary);
      text-shadow: 0 0 10px rgba(0, 240, 255, 0.4);
    }

    .stat-value.combo-highlight {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(255, 184, 0, 0.4);
    }

    /* Play Area */
    #game-canvas-container {
      position: relative;
      flex: 1;
      width: 100%;
      height: 100%;
      background-color: #08090e;
    }

    #game-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #webcam-video {
      display: none;
      width: 640px;
      height: 480px;
    }

    /* Panels */
    .screen-panel {
      position: absolute;
      inset: 0;
      background: rgba(7, 8, 13, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      text-align: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      touch-action: none;
    }

    .screen-panel.active {
      opacity: 1;
      pointer-events: auto;
    }

    .panel-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 24px 16px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    h1.panel-title {
      font-size: 1.8rem;
      font-weight: 900;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #fff 40%, #7e879a 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    p.panel-desc {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.5;
    }

    .btn {
      pointer-events: auto !important;
      touch-action: manipulation;
      background: linear-gradient(135deg, var(--primary), #d01464);
      color: #fff;
      border: none;
      width: 100%;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(255, 42, 133, 0.3);
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: inherit;
    }

    .btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(255, 42, 133, 0.4);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--panel-border);
      box-shadow: none;
      margin-top: 10px;
      color: var(--text);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      transform: translateY(-1px);
    }

    /* Mode Selector Top-Right */
    .mode-switch {
      position: absolute;
      top: 80px;
      right: 16px;
      z-index: 50;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      padding: 4px;
      border-radius: 12px;
      display: flex;
      pointer-events: auto;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    .mode-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      padding: 5px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      touch-action: manipulation;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--secondary), #00b4d8);
      color: #07080d;
      box-shadow: 0 4px 10px rgba(0, 240, 255, 0.25);
    }

    /* Countdown HUD */
    #ui-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 5;
    }

    #countdown-txt {
      font-size: 6rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 30px rgba(0, 240, 255, 0.6);
      transform: scale(0.3);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    #countdown-txt.show {
      transform: scale(1);
      opacity: 1;
    }

    /* Status Indicator Bottom-Left */
    #status-indicator {
      position: absolute;
      bottom: 20px;
      left: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(7, 8, 13, 0.85);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 700;
      border: 1px solid var(--panel-border);
      z-index: 50;
      pointer-events: auto;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background-color: var(--danger);
    }

    .status-dot.active {
      background-color: #34c759;
      box-shadow: 0 0 8px #34c759;
    }

    /* Guide Badge Bottom-Right */
    #guide-badge {
      position: absolute;
      bottom: 20px;
      right: 16px;
      background: var(--panel-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--panel-border);
      padding: 6px 12px;
      border-radius: 10px;
      font-size: 0.7rem;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
      z-index: 50;
      pointer-events: none;
    }

    .guide-highlight {
      color: var(--secondary);
      font-weight: 700;
    }

    #flash-overlay {
      position: absolute;
      inset: 0;
      background-color: var(--danger);
      opacity: 0;
      z-index: 4;
      pointer-events: none;
      transition: opacity 0.1s ease-out;
    }

    /* Developer Debug Console overlay */
    #debug-console {
      position: absolute;
      bottom: 60px;
      left: 16px;
      right: 16px;
      max-height: 80px;
      background: rgba(0, 0, 0, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 10px;
      padding: 8px;
      font-family: monospace;
      font-size: 0.65rem;
      color: #00f0ff;
      overflow-y: auto;
      z-index: 9999;
      pointer-events: auto;
      display: block;
      text-align: left;
    }
  </style>
</head>
<body>

  <div class="bg-glow glow-1" id="ambient-glow-1"></div>
  <div class="bg-glow glow-2" id="ambient-glow-2"></div>

  <div id="app-container">
    <div id="flash-overlay"></div>

    <!-- HUD Dashboard -->
    <header>
      <div class="brand-section">
        <div class="logo">CONE KNOCKOUT</div>
        <div class="sub-brand">Optimized Portrait Hybrid</div>
      </div>
      <div class="stats-container">
        <div class="stat-badge">
          <span class="stat-label">SCORE</span>
          <span class="stat-value score-highlight" id="score-val">0</span>
        </div>
        <div class="stat-badge">
          <span class="stat-label">COMBO</span>
          <span class="stat-value combo-highlight" id="combo-val">x1</span>
        </div>
        <div class="stat-badge">
          <span class="stat-label">TIME</span>
          <span class="stat-value" id="time-val">45s</span>
        </div>
      </div>
    </header>

    <!-- Play Mode Switcher -->
    <div class="mode-switch">
      <button class="mode-btn active" id="mode-camera" onclick="setPlayMode('camera')">카메라+터치</button>
      <button class="mode-btn" id="mode-touch" onclick="setPlayMode('touch')">터치 전용</button>
    </div>

    <!-- Render Area -->
    <div id="game-canvas-container">
      <canvas id="game-canvas"></canvas>
      <video id="webcam-video" autoplay muted playsinline></video>
    </div>

    <!-- Live Developer console -->
    <div id="debug-console">SYS: System ready. Tap startGame to initialize webcam.</div>

    <!-- Status indicator -->
    <div id="status-indicator">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">카메라 준비 안됨</span>
    </div>

    <!-- Instructions Tip -->
    <div id="guide-badge">
      <span id="guide-txt">로딩 중...</span>
    </div>

    <!-- START SCREEN -->
    <div class="screen-panel active" id="start-screen">
      <div class="panel-card">
        <h1 class="panel-title">CONE KNOCKOUT</h1>
        <p class="panel-desc">
          세로 모드 기반의 하이브리드 스포츠 게임입니다. 허공에 손을 뻗어 조준점으로 맞추거나, 화면을 직접 탭하여 콘을 파괴하세요!
        </p>
        <button class="btn" onclick="startGame(event)" ontouchstart="startGame(event)">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          게임 시작하기
        </button>
      </div>
    </div>

    <!-- GAME OVER SCREEN -->
    <div class="screen-panel" id="gameover-screen">
      <div class="panel-card">
        <h1 class="panel-title" style="background: linear-gradient(135deg, var(--primary) 0%, #a61250 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">FINISH</h1>
        <p class="panel-desc" id="gameover-score-txt" style="font-size: 1.3rem; font-weight: 900; color: #fff; margin-bottom: 8px;">
          최종 점수: 0점
        </p>
        <p class="panel-desc" id="gameover-combo-txt" style="font-size: 0.85rem; color: var(--accent); margin-bottom: 24px; font-weight: 700;">
          최대 콤보: x0
        </p>
        <button class="btn" onclick="startGame(event)" ontouchstart="startGame(event)">
          다시 도전하기
        </button>
        <button class="btn btn-secondary" onclick="showStartScreen(event)" ontouchstart="showStartScreen(event)">
          메인 화면으로
        </button>
      </div>
    </div>

    <!-- UI Overlay for Countdown -->
    <div id="ui-overlay">
      <div id="countdown-txt">3</div>
    </div>
  </div>

  <script>
    // --- Developer debug console helper ---
    const debugBox = document.getElementById('debug-console');
    function logDebug(msg) {
      console.log("[DEBUG] " + msg);
      if (debugBox) {
        debugBox.innerHTML += "<br>▶ " + msg;
        debugBox.scrollTop = debugBox.scrollHeight;
      }
    }

    // --- Dynamic Viewport height handler ---
    function updateVH() {
      const vh = window.innerHeight * 0.01;
      document.documentElement.style.setProperty('--vh', `${vh}px`);
    }
    window.addEventListener('resize', updateVH);
    window.addEventListener('orientationchange', updateVH);
    updateVH();

    // --- State variables ---
    let score = 0;
    let combo = 1;
    let maxCombo = 1;
    let timeRemaining = 45;
    let isPlaying = false;
    let isTransitioning = false;
    let gameTimer = null;
    let playMode = 'camera'; 
    let cameraActive = false;
    
    // Webcam streaming loop controllers
    let streamActive = false;
    let animationFrameId = null;
    
    // Adaptive LPF variables
    let pointerX = 0;
    let pointerY = 0;
    let lastTrackTime = 0;
    let hasLastPoint = false;
    const filterFactor = 0.4;
    
    // Targets
    let targets = [];
    const MAX_TARGETS = 4;
    let nextTargetId = 0;
    
    // Tracked points (tip, joints, palm)
    let trackedPoints = [];
    
    // FX
    let particles = [];
    let floatingTexts = [];
    let touchRipples = [];
    let shakeIntensity = 0;

    // Ambient colors
    const ambientColors = {
      normal: { glow1: '#ff2a85', glow2: '#00f0ff' },
      golden: { glow1: '#ffb800', glow2: '#ff2a85' },
      danger: { glow1: '#ff3b30', glow2: '#ff8800' }
    };

    // Web Audio synthesizer
    let audioCtx = null;
    function initAudio() {
      try {
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          logDebug("WebAudio initialized.");
        }
      } catch(e) {
        logDebug("WebAudio fail: " + e.message);
      }
    }
    
    function playSound(type) {
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'hit-normal') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(320, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(700, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.1);
      } else if (type === 'hit-golden') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime);
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.05);
        osc.frequency.exponentialRampToValueAtTime(1046, audioCtx.currentTime + 0.18);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.2);
      } else if (type === 'hit-bomb') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(100, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(30, audioCtx.currentTime + 0.35);
        gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.35);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.35);
      } else if (type === 'countdown') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.06, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.08);
      } else if (type === 'go') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
      } else if (type === 'gameover') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(260, audioCtx.currentTime);
        osc.frequency.setValueAtTime(200, audioCtx.currentTime + 0.12);
        osc.frequency.setValueAtTime(150, audioCtx.currentTime + 0.25);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
      }
    }

    // --- DOM refs ---
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    const video = document.getElementById('webcam-video');
    const scoreVal = document.getElementById('score-val');
    const comboVal = document.getElementById('combo-val');
    const timeVal = document.getElementById('time-val');
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const gameoverScoreTxt = document.getElementById('gameover-score-txt');
    const gameoverComboTxt = document.getElementById('gameover-combo-txt');
    const countdownTxt = document.getElementById('countdown-txt');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const guideTxt = document.getElementById('guide-txt');
    const flashOverlay = document.getElementById('flash-overlay');

    // --- Resizing ---
    function resizeCanvas() {
      const container = document.getElementById('game-canvas-container');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // --- MediaPipe Hands Setup ---
    let handsReady = false;
    const hands = new Hands({
      locateFile: (file) => {
        logDebug(`Loading MP Hands resource: ${file}`);
        return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
      }
    });

    hands.setOptions({
      maxNumHands: 1, 
      modelComplexity: 0, 
      minDetectionConfidence: 0.45,
      minTrackingConfidence: 0.45
    });

    hands.onResults(onHandResults);
    
    // Model loaded confirmation
    hands.initialize().then(() => {
      handsReady = true;
      logDebug("MediaPipe model initialized & ready.");
    }).catch(e => {
      logDebug("MediaPipe init fail: " + e.message);
    });

    // Aspect-ratio cover mapping logic
    function mapVideoToCanvas(normX, normY) {
      const canvasWidth = canvas.width;
      const canvasHeight = canvas.height;
      const vWidth = video.videoWidth || 640;
      const vHeight = video.videoHeight || 480;
      
      const vRatio = vWidth / vHeight;
      const cRatio = canvasWidth / canvasHeight;
      
      let sx = 0;
      let sy = 0;
      let sWidth = vWidth;
      let sHeight = vHeight;
      
      if (cRatio > vRatio) {
        sHeight = vWidth / cRatio;
        sy = (vHeight - sHeight) / 2;
      } else {
        sWidth = vHeight * cRatio;
        sx = (vWidth - sWidth) / 2;
      }
      
      const pixelX = normX * vWidth;
      const pixelY = normY * vHeight;
      
      const cropX = (pixelX - sx) / sWidth;
      const cropY = (pixelY - sy) / sHeight;
      
      const mappedX = (1.0 - cropX) * canvasWidth;
      const mappedY = cropY * canvasHeight;
      
      return { x: mappedX, y: mappedY };
    }

    function onHandResults(results) {
      if (!isPlaying || playMode !== 'camera') return;
      
      const now = Date.now();
      
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const landmarks = results.multiHandLandmarks[0];
        
        // Multi-point hand tracking
        const rawTip = mapVideoToCanvas(landmarks[8].x, landmarks[8].y);
        const rawJoint = mapVideoToCanvas(landmarks[5].x, landmarks[5].y);
        const rawPalm = mapVideoToCanvas(landmarks[9].x, landmarks[9].y);
        
        if (!hasLastPoint || (now - lastTrackTime > 600)) {
          pointerX = rawTip.x;
          pointerY = rawTip.y;
          hasLastPoint = true;
        } else {
          // Dynamic LPF factor
          const distance = Math.hypot(rawTip.x - pointerX, rawTip.y - pointerY);
          let adaptiveFactor = filterFactor; 
          
          if (distance < 30) {
            adaptiveFactor = 0.12; 
          } else if (distance > 150) {
            adaptiveFactor = 0.55; 
          }
          
          pointerX = pointerX + (rawTip.x - pointerX) * adaptiveFactor;
          pointerY = pointerY + (rawTip.y - pointerY) * adaptiveFactor;
        }
        
        lastTrackTime = now;
        
        trackedPoints = [
          { x: pointerX, y: pointerY },
          { x: rawJoint.x, y: rawJoint.y, aux: true },
          { x: rawPalm.x, y: rawPalm.y, aux: true }
        ];
      } else {
        trackedPoints = [];
      }
    }

    // --- Native HTML5 Webcam Initialization & Frame Looping ---
    // Modified constraints to support different Android/Galaxy camera sensors without OverconstrainedError
    async function startNativeWebcam() {
      if (cameraActive) return;
      
      logDebug("Requesting webcam stream...");
      
      const constraints = {
        video: {
          facingMode: 'user',
          width: { ideal: 640 },
          height: { ideal: 480 }
        },
        audio: false
      };

      try {
        const stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        
        video.setAttribute('autoplay', '');
        video.setAttribute('muted', '');
        video.setAttribute('playsinline', '');
        
        // Play command wrapped in promise to handle browser click restrictions
        video.play().then(() => {
          logDebug("Webcam streaming started.");
        }).catch(err => {
          logDebug("Play promise fail, triggering direct play: " + err.message);
          video.play();
        });
        
        video.onloadedmetadata = () => {
          cameraActive = true;
          statusDot.classList.add('active');
          statusText.innerText = "카메라 활성화됨";
          logDebug(`Camera aspect loaded: ${video.videoWidth}x${video.videoHeight}`);
          
          // Trigger manual frame ticking
          streamActive = true;
          tickCameraFrame();
        };
      } catch (err) {
        logDebug("Camera stream failed: " + err.name + " (" + err.message + ")");
        statusText.innerText = "카메라 연결 실패 (터치 모드 전환)";
        statusDot.classList.remove('active');
        setPlayMode('touch');
      }
    }

    async function tickCameraFrame() {
      if (!streamActive || playMode !== 'camera') return;
      
      // Guard webcam execution until model is fully compiled & ready
      if (handsReady && video.readyState === video.HAVE_ENOUGH_DATA) {
        try {
          await hands.send({ image: video });
        } catch (e) {
          // Silent catch to prevent console loop crash
        }
      }
      
      animationFrameId = requestAnimationFrame(tickCameraFrame);
    }

    function stopNativeWebcam() {
      streamActive = false;
      if (animationFrameId) cancelAnimationFrame(animationFrameId);
      
      if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
        video.srcObject = null;
      }
      cameraActive = false;
      statusDot.classList.remove('active');
      statusText.innerText = "카메라 꺼짐";
      logDebug("Webcam stopped.");
    }

    function setPlayMode(mode) {
      playMode = mode;
      document.getElementById('mode-camera').classList.toggle('active', mode === 'camera');
      document.getElementById('mode-touch').classList.toggle('active', mode === 'touch');
      
      if (mode === 'camera') {
        guideTxt.innerHTML = "손 조준점 & <span class='guide-highlight'>화면 터치 병행</span>이 가능합니다!";
        startNativeWebcam();
      } else {
        guideTxt.innerHTML = "화면의 고깔콘을 <span class='guide-highlight'>직접 탭</span>하여 쓰러뜨리세요!";
        stopNativeWebcam();
        trackedPoints = [];
      }
    }

    // Touch & Mouse bindings
    canvas.addEventListener('mousedown', handleInteraction);
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      for (let i = 0; i < e.changedTouches.length; i++) {
        handleInteraction(e.changedTouches[i]);
      }
    });

    function handleInteraction(e) {
      if (!isPlaying) return;
      
      const rect = canvas.getBoundingClientRect();
      const clientX = e.clientX || e.pageX;
      const clientY = e.clientY || e.pageY;
      
      const clickX = clientX - rect.left;
      const clickY = clientY - rect.top;
      
      const mappedX = (playMode === 'camera' && cameraActive) ? (canvas.width - clickX) : clickX;
      
      createTouchRipple(clickX, clickY);
      checkCollision(mappedX, clickY);
    }

    function checkCollision(x, y) {
      const hitboxMargin = 18; 
      
      for (let i = targets.length - 1; i >= 0; i--) {
        const target = targets[i];
        const dist = Math.hypot(target.x - x, target.y - y);
        if (dist < (target.radius + hitboxMargin)) {
          triggerHit(i);
          break;
        }
      }
    }

    function triggerHit(index) {
      const target = targets[index];
      const comboMultiplier = Math.min(3, 1 + combo * 0.1);
      
      if (target.type === 'bomb') {
        playSound('hit-bomb');
        triggerScreenFlash();
        createParticles(target.x, target.y, varColor('--danger'), 20, comboMultiplier);
        createFloatingText(target.x, target.y, "-15 Bomb!", varColor('--danger'), 1.2);
        
        shakeIntensity = 20;
        
        score = Math.max(0, score - 15);
        combo = 1;
        targets.splice(index, 1);
        spawnTarget();
      } else {
        const isGolden = target.type === 'golden';
        const baseScore = isGolden ? 30 : 10;
        const pts = baseScore * combo;
        score += pts;
        
        playSound(isGolden ? 'hit-golden' : 'hit-normal');
        
        createParticles(target.x, target.y, target.color, isGolden ? 22 : 12, comboMultiplier);
        createShockwave(target.x, target.y, target.color, (target.radius * 1.5) * comboMultiplier);
        createFloatingText(target.x, target.y, `+${pts}`, target.color, comboMultiplier);
        
        shakeIntensity = 6 * comboMultiplier;
        bumpHUD();
        
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        
        targets.splice(index, 1);
        spawnTarget();
      }
      
      scoreVal.innerText = score;
      comboVal.innerText = `x${combo}`;
      updateAmbientGlow(target.type);
    }

    function triggerScreenFlash() {
      flashOverlay.style.opacity = '0.35';
      setTimeout(() => {
        flashOverlay.style.opacity = '0';
      }, 150);
    }

    function bumpHUD() {
      const badges = document.querySelectorAll('.stat-badge');
      badges.forEach(b => {
        b.style.transform = 'scale(1.15)';
        b.style.transition = 'transform 0.05s ease-out';
        setTimeout(() => {
          b.style.transform = 'scale(1)';
          b.style.transition = 'transform 0.15s ease-in';
        }, 60);
      });
    }

    function updateAmbientGlow(type) {
      const theme = ambientColors[type] || ambientColors.normal;
      document.getElementById('ambient-glow-1').style.backgroundColor = theme.glow1;
      document.getElementById('ambient-glow-2').style.backgroundColor = theme.glow2;
    }

    // Particle FX
    function createParticles(x, y, color, count, multiplier) {
      for (let i = 0; i < count; i++) {
        const speed = (Math.random() * 5 + 3) * multiplier;
        const angle = Math.random() * Math.PI * 2;
        particles.push({
          type: 'shrapnel',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 1,
          radius: Math.random() * 3.5 + 1.5,
          color: color,
          alpha: 1,
          decay: Math.random() * 0.035 + 0.02
        });
      }
      for (let i = 0; i < Math.floor(count * 0.8); i++) {
        const speed = (Math.random() * 2 + 1) * multiplier;
        const angle = Math.random() * Math.PI * 2;
        particles.push({
          type: 'sparkle',
          x: x,
          y: y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed - 0.5,
          radius: Math.random() * 2 + 1,
          color: '#ffffff',
          alpha: 1,
          decay: Math.random() * 0.02 + 0.015,
          rot: Math.random() * Math.PI,
          rotSpeed: (Math.random() - 0.5) * 0.1
        });
      }
    }

    function createShockwave(x, y, color, maxRadius) {
      touchRipples.push({
        x: x,
        y: y,
        radius: 10,
        maxRadius: maxRadius,
        color: color,
        alpha: 0.8,
        growth: 4
      });
    }

    function createTouchRipple(x, y) {
      touchRipples.push({
        x: x,
        y: y,
        radius: 5,
        maxRadius: 40,
        color: '#ffffff',
        alpha: 0.6,
        growth: 3.5
      });
    }

    function createFloatingText(x, y, text, color, multiplier) {
      floatingTexts.push({
        x: x,
        y: y,
        text: text,
        color: color,
        alpha: 1,
        yVelocity: -2,
        life: 40,
        scale: 0.8 + (multiplier * 0.15),
        rot: (Math.random() - 0.5) * 0.3
      });
    }

    function spawnTarget() {
      if (targets.length >= MAX_TARGETS) return;
      
      const margin = 80;
      const x = Math.random() * (canvas.width - margin * 2) + margin;
      const y = Math.random() * (canvas.height - margin * 2) + margin;
      
      const roll = Math.random();
      let type = 'normal';
      let color = varColor('--secondary');
      let radiusScale = 0.09; 
      let life = null;
      
      if (roll > 0.90) {
        type = 'golden';
        color = varColor('--accent');
        radiusScale = 0.075;
        life = 3200;
      } else if (roll > 0.75) {
        type = 'bomb';
        color = varColor('--danger');
        radiusScale = 0.08;
        life = 5500;
      }
      
      targets.push({
        id: nextTargetId++,
        type: type,
        x: x,
        y: y,
        radius: Math.min(canvas.width, canvas.height) * radiusScale,
        color: color,
        scale: 0,
        pulse: 0,
        spawnTime: Date.now(),
        lifeLimit: life
      });
    }

    function varColor(cssVar) {
      return getComputedStyle(document.documentElement).getPropertyValue(cssVar).trim();
    }

    // Screens
    function showStartScreen(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      gameoverScreen.classList.remove('active');
      startScreen.classList.add('active');
      isPlaying = false;
      isTransitioning = false;
    }

    function startGame(e) {
      if (e) {
        e.preventDefault();
        e.stopPropagation();
      }
      
      if (isTransitioning) return;
      isTransitioning = true;

      initAudio();
      startScreen.classList.remove('active');
      gameoverScreen.classList.remove('active');

      if (playMode === 'camera' && !cameraActive) {
        startNativeWebcam();
      }

      runCountdown(3, () => {
        score = 0;
        combo = 1;
        maxCombo = 1;
        timeRemaining = 45;
        scoreVal.innerText = score;
        comboVal.innerText = `x${combo}`;
        timeVal.innerText = timeRemaining + "s";
        targets = [];
        particles = [];
        floatingTexts = [];
        touchRipples = [];
        isPlaying = true;
        isTransitioning = false;
        
        for(let i=0; i < 3; i++) {
          setTimeout(spawnTarget, i * 350);
        }
        
        startGameTimer();
      });
    }

    function runCountdown(sec, callback) {
      if (sec > 0) {
        countdownTxt.innerText = sec;
        countdownTxt.classList.add('show');
        playSound('countdown');
        setTimeout(() => {
          countdownTxt.classList.remove('show');
          setTimeout(() => runCountdown(sec - 1, callback), 100);
        }, 800);
      } else {
        countdownTxt.innerText = "GO!";
        countdownTxt.classList.add('show');
        playSound('go');
        setTimeout(() => {
          countdownTxt.classList.remove('show');
          callback();
        }, 800);
      }
    }

    function startGameTimer() {
      if (gameTimer) clearInterval(gameTimer);
      gameTimer = setInterval(() => {
        timeRemaining--;
        timeVal.innerText = timeRemaining + "s";
        
        if (timeRemaining <= 0) {
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      isPlaying = false;
      isTransitioning = false;
      clearInterval(gameTimer);
      playSound('gameover');
      
      gameoverScoreTxt.innerText = `최종 점수: ${score}점`;
      gameoverComboTxt.innerText = `최대 콤보: x${maxCombo}`;
      gameoverScreen.classList.add('active');
    }

    function draw3DCone(ctx, x, y, radius, color, isBomb, isGolden) {
      ctx.save();
      ctx.shadowBlur = 15;
      ctx.shadowColor = color;
      
      ctx.beginPath();
      ctx.ellipse(x, y + radius * 0.55, radius, radius * 0.32, 0, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
      ctx.strokeStyle = color;
      ctx.lineWidth = 2.5;
      ctx.fill();
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(x - radius * 0.9, y + radius * 0.55);
      ctx.lineTo(x, y - radius * 0.85);
      ctx.lineTo(x + radius * 0.9, y + radius * 0.55);
      ctx.closePath();
      
      const grad = ctx.createLinearGradient(x - radius, y, x + radius, y);
      if (isGolden) {
        grad.addColorStop(0, '#d4af37');
        grad.addColorStop(0.3, '#ffd700');
        grad.addColorStop(0.7, '#fffdd0');
        grad.addColorStop(1, '#aa7c11');
      } else if (isBomb) {
        grad.addColorStop(0, '#601010');
        grad.addColorStop(0.4, '#e63946');
        grad.addColorStop(0.7, '#ff8080');
        grad.addColorStop(1, '#601010');
      } else {
        grad.addColorStop(0, '#007f8a');
        grad.addColorStop(0.4, '#00f0ff');
        grad.addColorStop(0.7, '#f0ffff');
        grad.addColorStop(1, '#005b63');
      }
      ctx.fillStyle = grad;
      ctx.fill();
      
      ctx.beginPath();
      ctx.moveTo(x - radius * 0.4, y + radius * 0.1);
      ctx.lineTo(x, y - radius * 0.25);
      ctx.lineTo(x + radius * 0.4, y + radius * 0.1);
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
      ctx.lineWidth = 3;
      ctx.stroke();
      
      if (isBomb) {
        ctx.beginPath();
        ctx.moveTo(x - 8, y + 8); ctx.lineTo(x + 8, y + 24);
        ctx.moveTo(x + 8, y + 8); ctx.lineTo(x - 8, y + 24);
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 3;
        ctx.stroke();
      } else if (isGolden) {
        ctx.beginPath();
        ctx.arc(x, y - radius * 0.85, 8, 0, Math.PI * 2);
        ctx.fillStyle = '#fff';
        ctx.shadowBlur = 20;
        ctx.shadowColor = '#fff';
        ctx.fill();
      }

      ctx.restore();
    }

    // --- Main loop ---
    function gameLoop() {
      requestAnimationFrame(gameLoop);
      
      let dx = 0;
      let dy = 0;
      if (shakeIntensity > 0) {
        dx = (Math.random() - 0.5) * shakeIntensity;
        dy = (Math.random() - 0.5) * shakeIntensity;
        shakeIntensity *= 0.88;
        if (shakeIntensity < 0.2) shakeIntensity = 0;
      }
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      ctx.save();
      ctx.translate(dx, dy);
      
      const canvasWidth = canvas.width;
      const canvasHeight = canvas.height;
      const vWidth = video.videoWidth || 480;
      const vHeight = video.videoHeight || 360;

      // Draw webcam feed cover
      if (playMode === 'camera' && cameraActive) {
        ctx.save();
        ctx.scale(-1, 1);
        ctx.translate(-canvasWidth, 0);
        
        const vRatio = vWidth / vHeight;
        const cRatio = canvasWidth / canvasHeight;
        
        let sx = 0;
        let sy = 0;
        let sWidth = vWidth;
        let sHeight = vHeight;
        
        if (cRatio > vRatio) {
          sHeight = vWidth / cRatio;
          sy = (vHeight - sHeight) / 2;
        } else {
          sWidth = vHeight * cRatio;
          sx = (vWidth - sWidth) / 2;
        }
        
        ctx.drawImage(video, sx, sy, sWidth, sHeight, 0, 0, canvasWidth, canvasHeight);
        ctx.restore();
        
        ctx.fillStyle = 'rgba(7, 8, 13, 0.55)';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
      } else {
        ctx.fillStyle = '#08090e';
        ctx.fillRect(0, 0, canvasWidth, canvasHeight);
        
        ctx.strokeStyle = 'rgba(0, 240, 255, 0.025)';
        ctx.lineWidth = 1;
        const grid = 45;
        for (let x = 0; x < canvasWidth; x += grid) {
          ctx.beginPath();
          ctx.moveTo(x, 0); ctx.lineTo(x, canvasHeight);
          ctx.stroke();
        }
        for (let y = 0; y < canvasHeight; y += grid) {
          ctx.beginPath();
          ctx.moveTo(0, y); ctx.lineTo(canvasWidth, y);
          ctx.stroke();
        }
      }

      if (isPlaying) {
        if (playMode === 'camera' && cameraActive) {
          for (const pt of trackedPoints) {
            checkCollision(pt.x, pt.y);
            
            if (!pt.aux) {
              ctx.save();
              ctx.shadowBlur = 15;
              ctx.shadowColor = varColor('--secondary');
              
              ctx.beginPath();
              ctx.arc(pt.x, pt.y, 16 + Math.sin(Date.now() * 0.015) * 3, 0, Math.PI * 2);
              ctx.strokeStyle = 'rgba(0, 240, 255, 0.85)';
              ctx.lineWidth = 3;
              ctx.stroke();
              
              ctx.beginPath();
              ctx.arc(pt.x, pt.y, 5, 0, Math.PI * 2);
              ctx.fillStyle = '#fff';
              ctx.fill();
              
              ctx.restore();
            }
          }
        }

        const now = Date.now();
        for (let i = targets.length - 1; i >= 0; i--) {
          const target = targets[i];
          
          if (target.lifeLimit && (now - target.spawnTime > target.lifeLimit)) {
            targets.splice(i, 1);
            spawnTarget();
            continue;
          }

          if (target.scale < 1) target.scale += 0.12;
          target.pulse += 0.05;
          
          const currentRadius = target.radius * target.scale;
          
          ctx.save();
          ctx.beginPath();
          ctx.ellipse(target.x, target.y + currentRadius * 0.55, currentRadius * (1 + Math.sin(target.pulse) * 0.05), currentRadius * 0.32, 0, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
          ctx.fill();
          ctx.restore();

          draw3DCone(ctx, target.x, target.y, currentRadius, target.color, target.type === 'bomb', target.type === 'golden');
        }

        // Particle FX
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          
          if (p.type === 'shrapnel') {
            p.vy += 0.18;
          } else {
            p.vy += 0.03;
            p.rot += p.rotSpeed;
          }
          
          p.alpha -= p.decay;
          
          if (p.alpha <= 0) {
            particles.splice(i, 1);
            continue;
          }
          
          ctx.save();
          ctx.globalAlpha = p.alpha;
          ctx.translate(p.x, p.y);
          
          if (p.type === 'sparkle') {
            ctx.rotate(p.rot);
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(-p.radius, -p.radius, p.radius * 2, p.radius * 2);
          } else {
            ctx.beginPath();
            ctx.arc(0, 0, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.shadowBlur = 8;
            ctx.shadowColor = p.color;
            ctx.fill();
          }
          ctx.restore();
        }

        // Shockwaves & Ripples
        for (let i = touchRipples.length - 1; i >= 0; i--) {
          const r = touchRipples[i];
          r.radius += r.growth;
          r.alpha = 1 - (r.radius / r.maxRadius);
          
          if (r.radius >= r.maxRadius || r.alpha <= 0) {
            touchRipples.splice(i, 1);
            continue;
          }
          
          ctx.save();
          ctx.globalAlpha = r.alpha;
          ctx.beginPath();
          ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
          ctx.strokeStyle = r.color;
          ctx.lineWidth = 3;
          ctx.shadowBlur = 10;
          ctx.shadowColor = r.color;
          ctx.stroke();
          ctx.restore();
        }

        // Floating texts
        for (let i = floatingTexts.length - 1; i >= 0; i--) {
          const ft = floatingTexts[i];
          ft.y += ft.yVelocity;
          ft.life--;
          ft.alpha = ft.life / 40;
          
          if (ft.life <= 0) {
            floatingTexts.splice(i, 1);
            continue;
          }
          
          ctx.save();
          ctx.globalAlpha = ft.alpha;
          ctx.translate(ft.x, ft.y);
          ctx.rotate(ft.rot);
          ctx.scale(ft.scale, ft.scale);
          ctx.fillStyle = ft.color;
          ctx.font = 'black 900 1.1rem Outfit, Noto Sans KR';
          ctx.textAlign = 'center';
          ctx.shadowBlur = 4;
          ctx.shadowColor = ft.color;
          ctx.fillText(ft.text, 0, 0);
          ctx.restore();
        }
      }
      
      ctx.restore();
    }
    
    // Start Loop
    gameLoop();
  </script>
</body>
